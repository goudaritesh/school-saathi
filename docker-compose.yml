version: '3.8'

services:
  school-sathi-api:
    build: .
    container_name: school_sathi_backend
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    ports:
      - "5000:5000"
    networks:
      - school-sathi-network

  nginx:
    image: nginx:alpine
    container_name: school_sathi_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./uploads:/app/uploads:ro # Nginx serves uploads directly for speed
    depends_on:
      - school-sathi-api
    networks:
      - school-sathi-network

networks:
  school-sathi-network:
    driver: bridge
